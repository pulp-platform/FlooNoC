version: 2
updates:
  # Python dependencies managed by uv (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    # Only update to versions that have been published for at least 7 days,
    # to avoid pulling in compromised releases that get yanked quickly.
    cooldown:
      default-days: 7
    ignore:
      # Dependabot currently detects uv_build from [build-system.requires]
      # as uv-build, but cannot determine its previous version.
      - dependency-name: "uv-build"
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions used in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
