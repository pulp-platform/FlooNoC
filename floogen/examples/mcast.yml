#
# Example: narrow + wide multicast only (no reduction, no barrier)

name: nw_mesh_mcast
description: "4x4 NW mesh with narrow and wide multicast support"
network_type: "narrow-wide"

routing:
  route_algo: "XY"
  use_id_table: true
  collective:
    en_narrow_multicast: true
    en_wide_multicast: true

protocols:
  - name: "narrow_in"
    type: "narrow"
    protocol: "AXI4"
    data_width: 64
    addr_width: 48
    id_width: 5
    user_width:
      mcast_mask: 48
      user: 5
  - name: "narrow_out"
    type: "narrow"
    protocol: "AXI4"
    data_width: 64
    addr_width: 48
    id_width: 2
    user_width:
      mcast_mask: 48
      user: 5
  - name: "wide_in"
    type: "wide"
    protocol: "AXI4"
    data_width: 512
    addr_width: 48
    id_width: 3
    user_width:
      mcast_mask: 48
      user: 1
  - name: "wide_out"
    type: "wide"
    protocol: "AXI4"
    data_width: 512
    addr_width: 48
    id_width: 1
    user_width:
      mcast_mask: 48
      user: 1

endpoints:
  - name: "cluster"
    array: [4, 4]
    addr_range:
      base: 0x2000_0000
      size: 0x0004_0000
      en_multicast: true
    mgr_port_protocol:
      - "narrow_in"
      - "wide_in"
    sbr_port_protocol:
      - "narrow_out"
      - "wide_out"

routers:
  - name: "router"
    array: [4, 4]
    degree: 5

connections:
  - src: "cluster"
    dst: "router"
    src_range:
    - [0, 3]
    - [0, 3]
    dst_range:
    - [0, 3]
    - [0, 3]
    dst_dir: "Eject"
